# =============================================================================
# PRODUCTION PROFILE  (activated with SPRING_PROFILES_ACTIVE=prod)
# =============================================================================
# Every secret/host is supplied via environment variables (see deploy/.env).
# NOTHING sensitive is committed here. Defaults after ':' are non-secret only.
# =============================================================================
server:
  port: 8081
  # We sit behind the host Nginx (TLS terminator). Honour X-Forwarded-* so
  # Spring builds correct https:// OAuth2 callback URLs.
  forward-headers-strategy: framework
  shutdown: graceful

spring:
  application:
    name: ai-cloud-cost-optimizer

  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - read:user
              - user:email

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  ai:
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY}
      base-url: ${SPRING_AI_OPENAI_BASE_URL:https://openrouter.ai/api}
    vectorstore:
      pgvector:
        initialize-schema: true

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  frontend-url: ${APP_FRONTEND_URL}

# Expose ONLY health + info publicly; everything else stays internal.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    redis:
      enabled: true
    db:
      enabled: true