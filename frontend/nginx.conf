# Internal Nginx for the frontend container (rootless, listens on :8080).
# Only responsibility: serve the static SPA bundle with history-API fallback.
# TLS, security headers, gzip, rate-limiting and API proxying are handled by
# the HOST Nginx in front of this container (deploy/nginx/app.conf).
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets emitted by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React Router (BrowserRouter) — every unknown path returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}